services:
  - type: web
    name: orbitstaffing
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: TZ
        value: America/Chicago
      - key: SITE_BASE_URL
        value: https://orbitstaffing.io
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_PIN
        sync: false
      - key: ORBIT_DEV_PIN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SOLANA_WALLET_PRIVATE_KEY
        sync: false
      - key: HELIUS_API_KEY
        sync: false
      - key: TRUSTLAYER_BASE_URL
        value: https://dwtl.io
      - key: TRUST_LAYER_API_KEY
        sync: false
      - key: TRUST_LAYER_SECRET_KEY
        sync: false
      - key: DWSC_TREASURY_URL
        value: https://dwsc.io
      - key: DWSC_WEBHOOK_SECRET
        sync: false
      - key: ORBIT_ECOSYSTEM_API_KEY
        sync: false
      - key: ORBIT_ECOSYSTEM_API_SECRET
        sync: false
      - key: ORBIT_GITHUB_TOKEN
        sync: false
      - key: GARAGEBOT_WEBHOOK_SECRET
        sync: false
